<form [formGroup]="form" (ngSubmit)="submit()" class="calculator-form">
  <mat-form-field appearance="outline">
    <mat-label>Valor inicial</mat-label>
    <span matTextPrefix>R$&nbsp;</span>
    <input matInput type="number" min="0.01" step="0.01" formControlName="initialAmount" />
    @if (form.controls.initialAmount.invalid && form.controls.initialAmount.touched) {
      <mat-error>{{ initialAmountMessage }}</mat-error>
    }
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Prazo em meses</mat-label>
    <input matInput type="number" min="2" step="1" formControlName="months" />
    @if (form.controls.months.invalid && form.controls.months.touched) {
      <mat-error>{{ monthsMessage }}</mat-error>
    }
  </mat-form-field>

  <button mat-flat-button color="primary" type="submit" [disabled]="isLoading">
    @if (isLoading) {
      <mat-spinner diameter="20" />
    }
    Calcular
  </button>
</form>
